<title>Network Intel · Design System</title>
<link rel="stylesheet" href="ds/ds.css"/>
<script>
  (function(){
    var d=document.documentElement;
    try {
      var s=localStorage.getItem('nids-theme');
      if(!s){ s=(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'; }
      d.setAttribute('data-theme', s);
    } catch(e){ d.setAttribute('data-theme','light'); }
  })();
</script>
</head>
