# davmail config for nintel email transport (O365Manual, headless/Docker).
# Bridges local SMTP(1025)/IMAP(1143) to Exchange/O365 via OAuth.
# Auth model: SMTP/IMAP password = davmail cipher key (NOT the O365 password);
# real O365 login (account + MFA) happens once during the manual OAuth bootstrap.
davmail.mode=O365Manual
davmail.url=https://outlook.office365.com/EWS/Exchange.asmx

# Persist the encrypted OAuth refresh token so the bootstrap is one-time.
davmail.oauth.persistToken=true
davmail.oauth.tokenFilePath=/davmail/token.dat
# Well-known Outlook client_id (matches MailAgent's proven PoC config).
davmail.oauth.clientId=d3590ed6-52b3-4102-aeff-aad2292ab01c
# REQUIRED: davmail's default redirect (…/oauth2/nativeclient) is NOT registered for this
# client in the omadanetworks tenant → AADSTS50011. OOB is registered + verified working.
# With OOB the auth code comes back on a non-navigable urn: URL during bootstrap — capture it
# from the browser's Network panel, not the page. See README.md.
davmail.oauth.redirectUri=urn:ietf:wg:oauth:2.0:oob

# Local protocol ports (disable the ones we don't use).
davmail.imapPort=1143
davmail.smtpPort=1025
davmail.caldavPort=0
davmail.ldapPort=0
davmail.popPort=0

# Inside Docker the client arrives via the bridge gateway (not loopback), so
# allowRemote must be true. Security is enforced by mapping the host port to
# 127.0.0.1 only (see run-davmail.sh) — davmail is never exposed off-host.
davmail.bindAddress=0.0.0.0
davmail.allowRemote=true
davmail.server=true
davmail.disableUpdateCheck=true

# Loopback/LAN plaintext — no TLS on the local protocol legs.
davmail.smtpStartTls=false
davmail.imapStartTls=false
davmail.imapAutoExpunge=false

davmail.logFilePath=/davmail/davmail.log
log4j.logger.davmail=WARN
